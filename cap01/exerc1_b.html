<script>
    const conta = Number(prompt("Valor da conta: "));
    const clientes = Number(prompt("Quantos clientes vão pagar ?"));
    const valorDeCada = conta / clientes;
    alert(`Valor da Conta: ${conta.toFixed(2)}\nNúmero de Clientes: ${clientes}\nValor por cliente: ${valorDeCada.toFixed(2)}`)
</script>
