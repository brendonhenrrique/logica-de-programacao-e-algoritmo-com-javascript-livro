<script>
    const preco = Number(prompt("Preço: "));
    const taxaDeDesconto = preco * 0.10; // descobre o desconto
    const aVista = preco - (taxaDeDesconto); // subtrai do valor total...
    const parcelado = preco / 3;
    alert(`Preço R$: ${preco.toFixed(2)}\nÀ vista R$: ${aVista.toFixed(2)}\nOu 3x de R$: ${parcelado.toFixed(2)}`)
</script>
